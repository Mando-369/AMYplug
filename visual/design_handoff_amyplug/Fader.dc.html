<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex;flex-direction:column;align-items:center;gap:9px;width:54px;">
  <div style="font:600 18px/1 'Barlow Condensed',sans-serif;letter-spacing:.09em;text-transform:uppercase;color:#8a95a2;height:14px;white-space:nowrap;">{{ label }}</div>
  <div style="{{ trackWrapStyle }}">
    <div style="position:absolute;top:0;bottom:0;width:8px;left:50%;margin-left:-4px;background:#080b0e;border-radius:4px;box-shadow:inset 0 0 0 1px #202832,inset 0 2px 5px rgba(0,0,0,.7);"></div>
    <div style="position:absolute;top:6px;bottom:6px;left:50%;width:30px;margin-left:-15px;background-image:repeating-linear-gradient(to bottom, #29323d 0 1px, transparent 1px 22px);opacity:.55;"></div>
    <div style="{{ capStyle }}">
      <div style="position:absolute;left:5px;right:5px;top:50%;height:2px;margin-top:-1px;background:{{ accent }};border-radius:1px;box-shadow:0 0 6px {{ accent }};"></div>
    </div>
  </div>
  <div style="min-width:52px;text-align:center;font:400 17px/1.3 'IBM Plex Mono',monospace;color:#a9c2cf;background:#080b0e;border:1px solid #212a33;border-radius:3px;padding:3px 5px;">{{ readout }}</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:54,&quot;height&quot;:210},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;FREQ&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;readout&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;64&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;value&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:0.5,&quot;min&quot;:0,&quot;max&quot;:1,&quot;step&quot;:0.01,&quot;tsType&quot;:&quot;number&quot;},&quot;trackh&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:158,&quot;min&quot;:100,&quot;max&quot;:700,&quot;tsType&quot;:&quot;number&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#37c2d4&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#37c2d4&quot;,&quot;#d23b34&quot;,&quot;#3b63d6&quot;,&quot;#e8a13c&quot;]},&quot;cap&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#e8e0cf&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#e8e0cf&quot;,&quot;#d64b3f&quot;,&quot;#2c333d&quot;]}}">
class Component extends DCLogic {
  renderVals() {
    const v = Math.max(0, Math.min(1, this.props.value ?? 0.5));
    const h = this.props.trackh ?? 158;
    const trackWrapStyle = `position:relative;width:34px;height:${h}px;display:flex;justify-content:center;`;
    const cap = this.props.cap || '#e8e0cf';
    const capStyle = `position:absolute;left:50%;bottom:calc(${v * 100}% - 13px);transform:translateX(-50%);width:38px;height:26px;border-radius:4px;background:linear-gradient(180deg,${cap},#b7ad97);box-shadow:0 3px 6px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.6),inset 0 -2px 3px rgba(0,0,0,.25);border:1px solid rgba(0,0,0,.35);z-index:2;`;
    return {
      label: this.props.label ?? 'LVL',
      readout: this.props.readout ?? '',
      accent: this.props.accent || '#37c2d4',
      capStyle, trackWrapStyle
    };
  }
}
</script>
</body>
</html>
